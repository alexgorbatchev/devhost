name = "hello-stack"

[devtools.editor]
enabled = true
ide = "vscode"

[devtools.minimap]
enabled = true
position = "right"

[devtools.status]
enabled = true
position = "bottom-right"

[services.web]
primary = true
command = ["bun", "run", "web:dev"]
cwd = "./app"
port = 3000
host = "hello.local.test"
dependsOn = ["api"]

[services.web.env]
NODE_ENV = "development"

[services.api]
command = ["bun", "run", "api:dev"]
cwd = "./api"
port = 4000
host = "api.hello.local.test"
dependsOn = ["db"]

[services.api.health]
http = "http://127.0.0.1:4000/healthz"

[services.db]
command = ["bun", "run", "db:dev"]
cwd = "./db"
port = "auto"
