name = "hello-test-app"

[devtools.editor]
enabled = true
ide = "neovim"

[devtools.minimap]
enabled = true
position = "right"

[devtools.status]
enabled = true
position = "top-right"

[services.hello]
primary = true
command = "bun dev"
cwd = "."
port = 3200
#host = "hello.xcv.lol"
host = "hello.localhost"

[services.logs]
command = "bun log-demo"
cwd = "."

[services.logs.health]
process = true
