<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello from Bun + React</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, sans-serif;
        line-height: 1.5;
        --page-background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        --page-foreground: #0f172a;
        --panel-background: rgba(255, 255, 255, 0.92);
        --panel-border: #cbd5e1;
        --panel-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
        --muted-foreground: #334155;
        --control-background: #ffffff;
        --control-border: #cbd5e1;
      }

      :root[data-theme="light"] {
        color-scheme: light;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --page-background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
        --page-foreground: #e2e8f0;
        --panel-background: rgba(15, 23, 42, 0.92);
        --panel-border: #334155;
        --panel-shadow: 0 20px 40px rgba(2, 6, 23, 0.45);
        --muted-foreground: #94a3b8;
        --control-background: #0f172a;
        --control-border: #475569;
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]),
        :root[data-theme="system"] {
          --page-background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
          --page-foreground: #e2e8f0;
          --panel-background: rgba(15, 23, 42, 0.92);
          --panel-border: #334155;
          --panel-shadow: 0 20px 40px rgba(2, 6, 23, 0.45);
          --muted-foreground: #94a3b8;
          --control-background: #0f172a;
          --control-border: #475569;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page-background);
        color: var(--page-foreground);
      }

      #root {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .app-shell {
        width: min(100%, 720px);
        padding: 32px;
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        background: var(--panel-background);
        box-shadow: var(--panel-shadow);
      }

      .app-header {
        display: flex;
        gap: 24px;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 20px;
      }

      .app-title {
        margin: 0 0 12px;
        font-size: 2.25rem;
      }

      .app-lead {
        margin: 0;
        color: var(--muted-foreground);
      }

      .app-list {
        display: grid;
        gap: 10px;
        padding-left: 20px;
        margin: 0;
      }

      .app-code {
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.95rem;
      }

      .theme-toggle {
        display: grid;
        gap: 6px;
        flex-shrink: 0;
      }

      .theme-toggle__label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      .theme-toggle__control {
        min-width: 120px;
        padding: 8px 10px;
        border: 1px solid var(--control-border);
        border-radius: 10px;
        background: var(--control-background);
        color: inherit;
        font: inherit;
      }

      @media (max-width: 640px) {
        .app-shell {
          padding: 24px;
        }

        .app-header {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
