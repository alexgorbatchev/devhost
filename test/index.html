<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello from Bun + React</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, sans-serif;
        line-height: 1.5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      #root {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .app-shell {
        width: min(100%, 720px);
        padding: 32px;
        border: 1px solid #cbd5e1;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
      }

      .app-title {
        margin: 0 0 12px;
        font-size: 2.25rem;
      }

      .app-lead {
        margin: 0 0 20px;
        color: #334155;
      }

      .app-list {
        display: grid;
        gap: 10px;
        padding-left: 20px;
        margin: 0;
      }

      .app-code {
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
