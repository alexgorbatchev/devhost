<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello from Bun + React</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, sans-serif;
        line-height: 1.5;
        --page-background: linear-gradient(180deg, #f5f3ef 0%, #dfd8cf 100%);
        --page-foreground: #1f1b17;
        --panel-background: rgba(251, 248, 243, 0.94);
        --panel-border: #cfc5b8;
        --panel-shadow: 0 20px 40px rgba(32, 27, 22, 0.14);
        --muted-foreground: #5a5248;
        --control-background: #f6f2ec;
        --control-border: #b8aea1;
      }

      :root[data-theme="light"] {
        color-scheme: light;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --page-background: linear-gradient(180deg, #141311 0%, #25211d 100%);
        --page-foreground: #f4f0e8;
        --panel-background: rgba(35, 31, 27, 0.9);
        --panel-border: #5d564f;
        --panel-shadow: 0 20px 40px rgba(4, 3, 2, 0.48);
        --muted-foreground: #cbc2b8;
        --control-background: #2f2a25;
        --control-border: #756c62;
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]),
        :root[data-theme="system"] {
          --page-background: linear-gradient(180deg, #141311 0%, #25211d 100%);
          --page-foreground: #f4f0e8;
          --panel-background: rgba(35, 31, 27, 0.9);
          --panel-border: #5d564f;
          --panel-shadow: 0 20px 40px rgba(4, 3, 2, 0.48);
          --muted-foreground: #cbc2b8;
          --control-background: #2f2a25;
          --control-border: #756c62;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page-background);
        color: var(--page-foreground);
      }

      #root {
        min-height: 100vh;
        padding: 24px;
      }

      .app-shell {
        width: min(100%, 720px);
        margin: 0 auto;
        padding: 32px;
        display: grid;
        gap: 28px;
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        background: var(--panel-background);
        box-shadow: var(--panel-shadow);
      }

      .app-header {
        display: flex;
        gap: 24px;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 20px;
      }

      .app-title {
        margin: 0 0 12px;
        font-size: 2.25rem;
      }

      .app-lead {
        margin: 0;
        color: var(--muted-foreground);
      }

      .app-list {
        display: grid;
        gap: 10px;
        padding-left: 20px;
        margin: 0;
      }

      .app-sections {
        display: grid;
        gap: 18px;
      }

      .app-section {
        padding: 20px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: color-mix(in srgb, var(--panel-background) 82%, transparent);
      }

      .app-section__title {
        margin: 0 0 10px;
        font-size: 1.15rem;
      }

      .app-section__body {
        margin: 0;
        color: var(--muted-foreground);
      }

      .app-section__body + .app-section__body {
        margin-top: 10px;
      }

      .app-code {
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.95rem;
      }

      .app-code--underlined {
        text-decoration: underline;
        text-underline-offset: 0.14em;
      }

      .app-code--strong {
        font-weight: 700;
      }

      .theme-toggle {
        display: grid;
        gap: 6px;
        flex-shrink: 0;
      }

      .theme-toggle__label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      .theme-toggle__control {
        min-width: 120px;
        padding: 8px 10px;
        border: 1px solid var(--control-border);
        border-radius: 5px;
        background: var(--control-background);
        color: inherit;
        font: inherit;
      }

      @media (max-width: 640px) {
        .app-shell {
          padding: 24px;
        }

        .app-header {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
